<div class="col-md-6">
    <h2 class="text-center">Login</h2>

    <form (ngSubmit)="onLoginSubmit()">

        <!-- ERROR MESSAGE -->
        <div role="alert" *ngIf="formError" class="alert alert-danger text-center">
            {{ formError }}
        </div>

        <!-- EMAIL -->
        <div class="form-group row mb-2 align-items-center g-0">
            <label for="email" class="col-sm-3 col-form-label pe-1 mb-0">
                Email:
            </label>

            <div class="col-sm-9 ps-1">
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address"
                    [(ngModel)]="credentials.email" required />
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group row mb-2 align-items-center g-0">
            <label for="password" class="col-sm-3 col-form-label pe-1 mb-0">
                Password:
            </label>

            <div class="col-sm-9 ps-1">
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password"
                    [(ngModel)]="credentials.password" required />
            </div>
        </div>

        <!-- SUBMIT BUTTON (SIGN IN) -->
        <div class="text-center mt-3">
            <button type="submit" class="btn btn-primary" (keydown.enter)="onLoginSubmit()">
                Sign In
            </button>
        </div>

    </form>
</div>
