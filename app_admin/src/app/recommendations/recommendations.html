<div class="container">
  <h2>Top Picks for You</h2>
  <div *ngIf="results.length === 0">Loading your perfect vacation...</div>

  <div class="card mb-3" *ngFor="let trip of results">
    <div class="card-body">
      <h5 class="card-title">{{ trip.name }}</h5>
      <p class="card-text">{{ trip.description | slice:0:150 }}...</p>
      
      <!-- Show my algorithm Match Indicators -->
      <div class="mt-2">
        <span *ngFor="let match of trip.matches" class="badge badge-success mr-1">
          ✓ Matches your {{ match }}
        </span>
      </div>
      
      <div class="mt-3 text-right">
        <strong>Price: {{ trip.price | currency }}</strong>
      </div>
    </div>
  </div>
</div>
