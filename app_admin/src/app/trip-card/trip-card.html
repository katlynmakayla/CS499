<div class="card h-100 d-flex flex-column">
    <div class="card-header">
        {{ trip.name }}
    </div>
    <img src="assets/images/{{ trip.image }}" alt="trip thumbnail" class="card-img-top">
    <div class="card-body d-flex flex-column">
        <h6 class="card-subtitle mb-2 text-muted">
            {{ trip.resort }}
        </h6>
        <p class="card-subtitle mt-3 mb-3 text-muted">
            {{trip.lengthInDays}} days only {{trip.price|currency:'USD':'symbol'}} per person.
        </p>
        <!-- make the description expand to fill the available space -->
        <p class="card-text flex-grow-1" [innerHTML]="trip.description"></p>
        <!-- wrapped in a flex container to keep them side by side and eliminate the extra isLoggedIn check-->
        <!-- pinned to bottom -->
        <div *ngIf="isLoggedIn()" class="d-flex justify-content-between mt-auto pt-3">
            <button (click)="editTrip(trip)" class="btn btn-info">
                Edit Trip
            </button>
            <button (click)="deleteTrip(trip)" class="btn btn-danger">
                Delete Trip
            </button>
        </div>
    </div>
</div>
