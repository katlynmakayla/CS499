<div *ngIf="isLoggedIn()">
  <button (click)="addTrip()" class="btn btn-info">Add Trip</button>
</div>
<div class="row g-3 align-items-stretch">
  <div *ngFor="let trip of trips" class="col-12 col-sm-6 col-md-4 col-lg-3 d-flex">
    <app-trip-card [trip]="trip" class="w-100"></app-trip-card>
  </div>
</div>
